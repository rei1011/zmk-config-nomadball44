# ロータリーエンコーダの設定
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# PMW3610 trackball (right half only)
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610=y

# Wireless HID (BLE)
CONFIG_ZMK_BLE=y

# Battery: ADC 読み取り + ホスト向け BLE BAS（セントラル側）
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_BT_BAS=y

# RGB LED widget — 各半分は自分の残量のみ点滅（README の split デフォルト）
# PROXY/FETCHING は「セントラルで相手側も点滅」またはホストに副次 BAS を出す用途のみ必要
CONFIG_RGBLED_WIDGET_BATTERY_SHOW_SELF=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=10
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30